apiVersion: apps/v1
kind: Deployment
metadata:
  name: burnout-app-deployment
  labels:
    app: burnout-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: burnout-app
  template:
    metadata:
      labels:
        app: burnout-app
    spec:
      containers:
        - name: burnout-app
          image: europe-west3-docker.pkg.dev/suml-dev-s28722-499308/burnout-app/burnout-app:latest
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 512Mi
