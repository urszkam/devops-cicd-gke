apiVersion: v1
kind: ConfigMap
metadata:
  name: blackbox-exporter-config
data:
  blackbox.yaml: |
    modules:
      http_2xx:
        prober: http
        timeout: 5s
        http:
          method: GET
          valid_status_codes: [200]
          preferred_ip_protocol: ip4
          fail_if_body_not_matches_regexp:
            - ok
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: blackbox-exporter
  labels:
    app: blackbox-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: blackbox-exporter
  template:
    metadata:
      labels:
        app: blackbox-exporter
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: blackbox-exporter
          image: quay.io/prometheus/blackbox-exporter:v0.28.0
          args:
            - --config.file=/config/blackbox.yaml
          ports:
            - name: metrics
              containerPort: 9115
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: blackbox-exporter-config
---
apiVersion: monitoring.googleapis.com/v1
kind: PodMonitoring
metadata:
  name: burnout-app-probe
spec:
  selector:
    matchLabels:
      app: blackbox-exporter
  endpoints:
    - port: metrics
      path: /probe
      interval: 30s
      timeout: 10s
      params:
        module:
          - http_2xx
        target:
          - http://burnout-app-service.default.svc.cluster.local/_stcore/health
