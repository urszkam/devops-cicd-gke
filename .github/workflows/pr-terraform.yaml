name: Terraform

on:
  pull_request:
    paths:
      - "terraform/**"
      - "config/.tflint.hcl"
      - ".github/workflows/pr-terraform.yaml"

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-dev
  cancel-in-progress: false

jobs:
  terraform-format:
    name: Terraform fmt
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.13.0"

      - name: Check formatting
        run: terraform fmt -check -recursive

  terraform-validate:
    name: Terraform validate
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.13.0"

      - name: Init Terraform
        run: terraform init -backend=false -input=false

      - name: Validate Terraform
        run: terraform validate

  terraform-tflint:
    name: TFLint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.13.0"

      - name: Set up TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.58.1

      - name: Run TFLint
        run: |
          tflint --config="${{ github.workspace }}/config/.tflint.hcl" --init
          tflint --config="${{ github.workspace }}/config/.tflint.hcl" --recursive

  terraform-checkov:
    name: Checkov
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Checkov
        run: |
          python -m pip install --upgrade pip
          pip install checkov

      - name: Run Checkov
        run: checkov -d . --framework terraform

  terraform-plan:
    name: Terraform plan
    runs-on: ubuntu-latest
    needs:
      - terraform-format
      - terraform-validate
      - terraform-tflint
      - terraform-checkov

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_TERRAFORM_SERVICE_ACCOUNT }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.13.0"

      - name: Init Terraform
        run: terraform init -input=false

      - name: Create plan
        run: terraform plan -input=false -out=tfplan -var-file=tfvars/dev.tfvars

      - name: Add plan to summary
        run: |
          terraform show -no-color tfplan > plan.txt
          cat plan.txt >> "$GITHUB_STEP_SUMMARY"

      - name: Upload plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-pr-plan
          path: terraform/plan.txt
          retention-days: 7
